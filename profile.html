<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #050508;
  color: white;

  opacity: 0;
  animation: fade 0.8s ease forwards;
}

@keyframes fade {
  to { opacity: 1; }
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at top left, rgba(140,0,255,0.4), transparent 40%),
    radial-gradient(circle at bottom right, rgba(255,0,200,0.3), transparent 40%);
}

/* HEADER */
header {
  padding: 15px;
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,0.7);
}

header div {
  cursor: pointer;
}

/* HERO */
.hero {
  padding: 25px 15px;
}

/* TITLE */
.title {
  font-size: 24px;
  font-weight: 700;

  opacity: 0;
  transform: translateY(20px);
  animation: up 0.8s ease forwards;
  animation-delay: 0.3s;
}

.title span {
  color: #c084ff;
}

/* DESC */
.desc {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.8;

  opacity: 0;
  transform: translateY(20px);
  animation: up 0.8s ease forwards;
  animation-delay: 0.6s;
}

/* BUTTON */
.btn {
  margin-top: 15px;
  display: inline-block;
  padding: 10px 15px;
  border-radius: 8px;
  background: linear-gradient(135deg, #ff00aa, #6a00ff);
  font-size: 13px;
  text-decoration: none;
  color: white;

  box-shadow: 0 0 15px #a100ff;
  transition: 0.3s;

  opacity: 0;
  transform: translateY(20px);
  animation: up 0.8s ease forwards;
  animation-delay: 0.9s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #ff00aa;
}

/* IMAGE */
.image-box {
  margin-top: 25px;
  margin-bottom: 50px;
  position: relative;
  text-align: center;

  opacity: 0;
  transform: scale(0.9);
  animation: zoom 0.8s ease forwards;
  animation-delay: 1.2s;
}

.image-box img {
  width: 80%;
  border-radius: 15px;

  /* GLOW HIDUP */
  animation: glow 3s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px #a100ff; }
  to { box-shadow: 0 0 30px #ff00aa; }
}

/* STATS (POSISI FIX) */
.stats-wrapper {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
}

/* BOX */
.stat-box {
  text-align: center;
  background: rgba(0,0,0,0.7);
  padding: 8px 14px;
  border-radius: 12px;
  backdrop-filter: blur(6px);

  box-shadow: 0 5px 20px rgba(160,0,255,0.6);
  animation: pulse 2s infinite alternate;
}

/* ANGKA */
.stat-box b {
  font-size: 18px;
  display: block;
}

/* TEXT */
.stat-box span {
  font-size: 11px;
  color: #c084ff;
}

/* GLOW BOX */
@keyframes pulse {
  from { box-shadow: 0 0 10px #a100ff; }
  to { box-shadow: 0 0 25px #ff00aa; }
}

/* ANIM */
@keyframes up {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes zoom {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* POP EFFECT */
.pop {
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(0.7); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<header>
  <div>Profile</div>
  <div onclick="go('index.html')">🏠</div>
</header>

<div class="hero">

  <div class="title">
    Masih belajar di dunia digital <br>
    Keep learning,  <span> keep growing</span>.
  </div>

  <div class="desc">
    Halo, gue sedang belajar dan membangun sesuatu di dunia digital.
  </div>

  <a href="https://wa.me/6289506731687" target="_blank" class="btn">
    My Contact
  </a>

  <div class="image-box">
    <img src="pacik.jpg">

    </div>

  </div>

</div>

<script>
function go(page){
  window.location.href = page;
}

/* COUNT + POP */
function count(id, target){
  let el = document.getElementById(id);
  let i = 0;
  let speed = target / 30;

  let interval = setInterval(() => {
    i += speed;
    if(i >= target){
      el.innerText = target;
      el.classList.add("pop");
      clearInterval(interval);
    } else {
      el.innerText = Math.floor(i);
    }
  }, 30);
}

window.onload = () => {
  setTimeout(() => {
    count("project", 10);
    count("year", 1);
  }, 1200);
};
</script>

</body>
</html>
