<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkVerse</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family:'Poppins',sans-serif;
  background:#050508;
  color:white;

  opacity:0;
  transform:scale(0.95);
  filter:blur(10px);
  animation:open 0.8s ease forwards;
}

@keyframes open {
  to {
    opacity:1;
    transform:scale(1);
    filter:blur(0);
  }
}

/* NEON BG */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left, rgba(140,0,255,0.4), transparent 40%),
    radial-gradient(circle at bottom right, rgba(255,0,200,0.3), transparent 40%);
}

/* HEADER */
header {
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:10;
}

header a {
  color:white;
  text-decoration:none;
  font-size:20px;
  font-weight:600;
  letter-spacing:1px;
  text-shadow:0 0 10px #a100ff;
}

/* BANNER VIDEO */
.banner {
  height:180px;
  margin:15px;
  border-radius:15px;
  overflow:hidden;
  position:relative;
}

.banner video {
  width:100%;
  height:100%;
  object-fit:cover;
}

.banner::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, transparent, black);
}

/* MENU */
.box {
  margin:25px 10px;
}

.menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.menu div {
  padding:25px;
  text-align:center;
  border-radius:15px;
  background:rgba(255,255,255,0.05);

  opacity:0;
  transform:translateY(20px);
  animation:show 0.6s ease forwards;
}

.menu div:nth-child(1){ animation-delay:0.2s; }
.menu div:nth-child(2){ animation-delay:0.4s; }
.menu div:nth-child(3){ animation-delay:0.6s; }
.menu div:nth-child(4){ animation-delay:0.8s; }

@keyframes show {
  to {
    opacity:1;
    transform:translateY(0);
  }
}

.menu span {
  display:block;
  font-size:30px;
  margin-bottom:8px;
}

/* HOVER */
.menu div:hover {
  transform:scale(1.05);
  background:linear-gradient(135deg,#ff00aa,#6a00ff);
  box-shadow:0 0 25px #a100ff;
}

/* TEXT */
.menu-text {
  text-align:center;
  margin-top:15px;
  font-size:13px;
  opacity:0.7;

  opacity:0;
  animation:fade 1s ease forwards;
  animation-delay:1s;
}

@keyframes fade {
  to { opacity:0.7; }
}
</style>
</head>

<body>

<header>
  <a href="index.html">DarkVerse by Xyro</a>
</header>

<div class="banner">
  <video autoplay muted loop playsinline>
    <source src="cuki.mp4" type="video/mp4">
  </video>
</div>

<div class="box">
  <div class="menu">

    <div onclick="go('about.html')">
      <span>👤</span>About
    </div>

    <div onclick="go('profile.html')">
      <span>📄</span>Profile
    </div>

    <div onclick="go('account.html')">
      <span>⚙️</span>Account
    </div>

    <div onclick="go('galery.html')">
      <span>🖼️</span>Gallery
    </div>

  </div>

  <p class="menu-text">copyright by xyro</p>
</div>

<script>
function go(page){
  document.body.style.opacity="0";
  document.body.style.transform="scale(0.95)";
  document.body.style.filter="blur(10px)";
  setTimeout(()=>{
    window.location.href=page;
  },300);
}
</script>

</body>
</html>
