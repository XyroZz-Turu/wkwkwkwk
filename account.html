<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family:'Poppins',sans-serif;
  background:#050508;
  color:white;

  opacity:0;
  transform:scale(0.95);
  filter:blur(10px);
  animation:open 0.8s ease forwards;
}

@keyframes open {
  to {
    opacity:1;
    transform:scale(1);
    filter:blur(0);
  }
}

/* NEON BG */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left, rgba(140,0,255,0.4), transparent 40%),
    radial-gradient(circle at bottom right, rgba(255,0,200,0.3), transparent 40%);
}

/* HEADER */
header {
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

header a {
  color:white;
  text-decoration:none;
  font-size:18px;
}

/* BANNER VIDEO */
.banner {
  height:170px;
  margin:15px;
  border-radius:15px;
  overflow:hidden;
  position:relative;
}

.banner video {
  width:100%;
  height:100%;
  object-fit:cover;
}

.banner::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, transparent, black);
}

/* GRID */
.container {
  padding:15px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

/* ITEM */
.item {
  padding:20px;
  border-radius:15px;
  text-align:center;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.05);

  opacity:0;
  transform:translateY(20px);
  animation:up 0.5s ease forwards;
}

/* DELAY */
.item:nth-child(1){ animation-delay:0.2s; }
.item:nth-child(2){ animation-delay:0.4s; }
.item:nth-child(3){ animation-delay:0.6s; }
.item:nth-child(4){ animation-delay:0.8s; }

/* HOVER */
.item:hover {
  transform:scale(1.05);
  background:linear-gradient(135deg,#ff00aa,#6a00ff);
  box-shadow:0 0 25px #a100ff;
}

/* ICON */
.icon {
  font-size:28px;
  margin-bottom:5px;
}

/* DESC */
.desc {
  font-size:12px;
  opacity:0.6;
  margin-top:5px;
}

/* LAST ITEM */
.full {
  margin-top:15px;
  text-align:center;

  opacity:0;
  animation:up 0.5s ease forwards;
  animation-delay:1s;
}

.full a {
  display:inline-block;
  width:60%;
}

/* ANIM */
@keyframes up {
  to {
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<header>
  <a href="index.html">🏠 Home</a>
  <div>Account</div>
</header>

<!-- VIDEO BANNER -->
<div class="banner">
  <video autoplay muted loop playsinline>
    <source src="suki.mp4" type="video/mp4">
  </video>
</div>

<div class="container">

  <div class="grid">

    <a href="https://wa.me/6289506731687" class="item" onclick="fade(event, this.href)">
      <div class="icon">📱</div>
      WhatsApp
      <div class="desc">Chat langsung</div>
    </a>

    <a href="mailto:hiuvoly@gmail.com" class="item" onclick="fade(event, this.href)">
      <div class="icon">📧</div>
      Gmail
      <div class="desc">Kirim email</div>
    </a>

    <a href="https://instagram.com/xyrozytzy" class="item" onclick="fade(event, this.href)">
      <div class="icon">📸</div>
      Instagram
      <div class="desc">Lihat profil</div>
    </a>

    <a href="https://tiktok.com/@ken.xybz" class="item" onclick="fade(event, this.href)">
      <div class="icon">🎵</div>
      TikTok
      <div class="desc">Konten video</div>
    </a>

  </div>

  <div class="full">
    <a href="https://youtube.com/el_XyroVaa" class="item" onclick="fade(event, this.href)">
      <div class="icon">▶️</div>
      YouTube
      <div class="desc">Channel video</div>
    </a>
  </div>

</div>

<script>
function fade(e, link){
  e.preventDefault();
  document.body.style.opacity="0";
  document.body.style.transform="scale(0.95)";
  document.body.style.filter="blur(10px)";
  setTimeout(()=>{
    window.location.href=link;
  },300);
}
</script>

</body>
</html>
